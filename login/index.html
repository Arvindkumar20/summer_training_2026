<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resitration</title>
    <link rel="stylesheet" href="./assets/css/login.css">
</head>

<body>

    <main class="login-form-container">
        <!-- left section  -->
        <section class="form-left-container">

            <div class="form-logo">
                <img src="./assets/images/logo.png" alt="logo">
            </div>
            <div class="form-left-heading">
                <h1>modern login page</h1>
            </div>
            <div class="form-description">
                <article>This is our login page with modern user experience and user interface</article>
            </div>

        </section>


        <!-- right section  -->
        <section class="form-right-section">
            <!-- heading  -->
            <div class="form-right-heading">
                <h2>Sign Up</h2>
            </div>

            <!-- form section  -->
            <section>
                <form class="form">
                    <div class="name-input">
                        <input type="text" placeholder="First Name">
                        <input type="text" placeholder="Last Name">
                    </div>
                    <input type="text" placeholder="Enter  user Name">
                    <input type="text" placeholder="Enter your email">
                    <input type="text" placeholder="Enter your  password">
                    <input type="text" placeholder="Enter your  password">
                    <div class="terms-check-box">
                        <input type="checkbox">
                        <span>Agreed to terms and conditions</span>
                    </div>
             
                        <button type="submit">Submit</button>
               
                </form>
            </section>


            <!-- form form-description  -->
            <div class="form-right-description">
                <span>Already as a member </span>
                <a href="/login">Login</a>
            </div>

        </section>

    </main>
</body>

</html>
